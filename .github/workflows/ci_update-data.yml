name: '🔄 Update Data'

on:
  schedule:
    - cron: '0 3 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.repository.fork == false
    name: Update
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: ➕ Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-linux-${{ hashFiles('bun.lock') }}
          restore-keys: bun-linux-

      - name: 📦 Installing Dependencies
        run: bun install --frozen-lockfile

      - name: ⏫ Updating Data
        run: |
          bun run fetch
          bun run svg
          bun run stats
          bun run lint:fix
        env:
          GITHUB_TOKEN: ${{ secrets.API }}

      - name: ⚙️ Configuring Git
        run: |
          git config --global user.name 'wellwelwel'
          git config --global user.email '${{ secrets.EMAIL }}'

      - name: 🔎 Checking for Changes
        id: check_changes
        run: |
          if git diff-index --quiet HEAD --; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Commiting and Pushing Changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add .
          git commit -m "chore: update data"
          git push origin HEAD:refs/heads/main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
